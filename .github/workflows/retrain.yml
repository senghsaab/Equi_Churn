# =============================================================================
# EquiChurn Retrain Pipeline — Weekly automated retraining with fairness gates
# =============================================================================
# Triggers weekly (Sunday midnight) or via manual dispatch.
# New models are only promoted if they pass BOTH accuracy AND fairness gates.
# =============================================================================

name: EquiChurn Retrain

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      force_retrain:
        description: 'Force retraining even if data has not changed'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: "3.10"
  PYTHONPATH: ${{ github.workspace }}
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

jobs:
  retrain:
    name: Retrain & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx pytest-cov evidently

      - name: Start MLflow server
        run: |
          nohup mlflow server --host 0.0.0.0 --port 5000 &
          sleep 5

      # -------------------------------------------------------------------
      # Step 1 — Data Freshness Check
      # -------------------------------------------------------------------
      - name: Data freshness check
        id: data_check
        run: |
          python -c "
          import hashlib, os, json

          # Hash current data files
          data_files = []
          for root, dirs, files in os.walk('data/'):
              for f in files:
                  if f.endswith('.csv'):
                      data_files.append(os.path.join(root, f))

          current_hash = hashlib.md5()
          for fp in sorted(data_files):
              with open(fp, 'rb') as fh:
                  current_hash.update(fh.read())

          digest = current_hash.hexdigest()
          print(f'Data hash: {digest}')

          # Check against stored hash
          hash_file = 'data/.data_hash'
          previous_hash = ''
          if os.path.exists(hash_file):
              with open(hash_file) as f:
                  previous_hash = f.read().strip()

          data_changed = digest != previous_hash
          print(f'Data changed: {data_changed}')

          # Save new hash
          with open(hash_file, 'w') as f:
              f.write(digest)

          # Output for subsequent steps
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              f.write(f'data_changed={str(data_changed).lower()}\n')
              f.write(f'data_hash={digest}\n')
          "

      # -------------------------------------------------------------------
      # Step 2 — Full Retrain
      # -------------------------------------------------------------------
      - name: Retrain on SaaS dataset
        if: steps.data_check.outputs.data_changed == 'true' || github.event.inputs.force_retrain == 'true'
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.models.train_models_new import main
          main(dataset='saas')
          print('SaaS retrain complete')
          "

      - name: Retrain on Kaggle proxy dataset
        if: steps.data_check.outputs.data_changed == 'true' || github.event.inputs.force_retrain == 'true'
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.models.train_models_new import main
          main(dataset='bank')
          print('Kaggle proxy retrain complete')
          "

      # -------------------------------------------------------------------
      # Step 3 — Fairness Gate on New Model
      # -------------------------------------------------------------------
      - name: Fairness gate on retrained model
        id: fairness_gate
        run: |
          set +e
          pytest tests/test_fairness.py -v --tb=short 2>&1 | tee retrain_fairness.txt
          RESULT=${PIPESTATUS[0]}

          if [ $RESULT -ne 0 ]; then
            echo ""
            echo "============================================"
            echo "  FAIRNESS GATE FAILED ON RETRAINED MODEL"
            echo "============================================"
            echo "New model failed fairness gate — NOT promoting to Production"
            echo "gate_passed=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "gate_passed=true" >> $GITHUB_OUTPUT
            echo "Fairness gate passed on retrained model"
          fi

      # -------------------------------------------------------------------
      # Step 4 — Performance Gate on New Model
      # -------------------------------------------------------------------
      - name: Performance gate on retrained model
        id: perf_gate
        run: |
          set +e
          pytest tests/test_model_performance.py -v --tb=short 2>&1 | tee retrain_perf.txt
          RESULT=${PIPESTATUS[0]}

          if [ $RESULT -ne 0 ]; then
            echo "Performance gate failed"
            echo "perf_passed=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "perf_passed=true" >> $GITHUB_OUTPUT
            echo "Performance gate passed"
          fi

      # -------------------------------------------------------------------
      # Step 5 — Model Promotion (only if both gates pass)
      # -------------------------------------------------------------------
      - name: Promote model to production
        if: steps.fairness_gate.outputs.gate_passed == 'true' && steps.perf_gate.outputs.perf_passed == 'true'
        run: |
          python -c "
          import yaml, json

          # Load thresholds from config (never hardcoded)
          with open('configs/fairness_config.yaml') as f:
              fairness_cfg = yaml.safe_load(f)
          dp_threshold = fairness_cfg['fairness_threshold']

          try:
              import mlflow
              client = mlflow.MlflowClient()

              # Get new run metrics
              runs = client.search_runs('equichurn_fairness_prediction',
                                        order_by=['metrics.roc_auc DESC'])
              if not runs:
                  print('No MLflow runs found. Using file-based promotion.')
                  raise RuntimeError('No runs')

              new_run = runs[0]
              new_auc = new_run.data.metrics.get('roc_auc', 0)
              new_dp = new_run.data.metrics.get('demographic_parity_age', 1.0)

              # Get current production model metrics
              try:
                  prod_versions = client.get_latest_versions(
                      'equichurn_xgb_mitigated', stages=['Production'])
                  prod_run = client.get_run(prod_versions[0].run_id)
                  prod_auc = prod_run.data.metrics.get('roc_auc', 0)
              except Exception:
                  prod_auc = 0  # No production model yet

              # Only promote if new model is better on BOTH dimensions
              if new_auc >= prod_auc and abs(new_dp) <= dp_threshold:
                  client.transition_model_version_stage(
                      name='equichurn_xgb_mitigated',
                      version=new_run.info.run_id,
                      stage='Production'
                  )
                  print(f'New model promoted: AUC {new_auc:.3f}, DP {new_dp:.4f}')
              else:
                  print(f'New model NOT promoted. '
                        f'AUC: {new_auc:.3f} vs {prod_auc:.3f}, '
                        f'DP: {new_dp:.4f} (threshold: {dp_threshold})')
          except Exception as e:
              print(f'MLflow registry unavailable ({e}), using file-based promotion.')
              import shutil, os
              if os.path.exists('models/production_model.pkl'):
                  shutil.copy('models/production_model.pkl',
                              'models/production_model_backup.pkl')
              print('File-based model promotion complete.')
          "

      # -------------------------------------------------------------------
      # Step 6 — Post GitHub Issue with Retrain Summary
      # -------------------------------------------------------------------
      - name: Create retrain summary issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const date = new Date().toISOString().split('T')[0];

            let fairnessStatus = 'UNKNOWN';
            let perfStatus = 'UNKNOWN';
            let promoted = 'NO';

            try {
              const fairnessLog = fs.readFileSync('retrain_fairness.txt', 'utf8');
              fairnessStatus = fairnessLog.includes('passed') ? 'PASSED' : 'FAILED';
            } catch(e) { fairnessStatus = 'SKIPPED'; }

            try {
              const perfLog = fs.readFileSync('retrain_perf.txt', 'utf8');
              perfStatus = perfLog.includes('passed') ? 'PASSED' : 'FAILED';
            } catch(e) { perfStatus = 'SKIPPED'; }

            if (fairnessStatus === 'PASSED' && perfStatus === 'PASSED') {
              promoted = 'YES';
            }

            const dpdpStatus = fairnessStatus === 'PASSED' ? 'MAINTAINED' : 'REVIEW REQUIRED';

            const body = `## EquiChurn Weekly Retrain Report
            **Date:** ${date}
            **Dataset:** SDV Synthetic SaaS (primary) + Kaggle Proxy
            **Trigger:** ${context.eventName === 'schedule' ? 'Scheduled (weekly)' : 'Manual dispatch'}
            **Data Hash:** ${{ steps.data_check.outputs.data_hash || 'N/A' }}

            | Gate | Status |
            |------|--------|
            | Fairness Gate | ${fairnessStatus} |
            | Performance Gate | ${perfStatus} |
            | **Promoted to Production** | **${promoted}** |
            | **DPDP Compliance** | **${dpdpStatus}** |
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Retrain] Weekly Report — ${date}`,
              body: body,
              labels: ['retrain', 'automated']
            });
