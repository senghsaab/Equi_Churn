# =============================================================================
# EquiChurn Evidently Monitoring — Weekly Data Drift Detection
# =============================================================================
# Runs independently of retrain. Detects feature drift between the training
# baseline and current production predictions. Creates a GitHub Issue alert
# when PSI scores exceed threshold.
# =============================================================================

name: Evidently Monitoring

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6 AM UTC (after Sunday retrain)
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  PYTHONPATH: ${{ github.workspace }}

jobs:
  drift-detection:
    name: Data Drift Detection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install evidently

      - name: Run drift detection
        id: drift
        run: |
          python scripts/run_drift_check.py 2>&1 | tee drift_output.txt

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidently-drift-report
          path: reports/figures/drift_week_*.html
          retention-days: 90

      - name: Alert on significant drift
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let driftOutput = '';
            try {
              driftOutput = fs.readFileSync('drift_output.txt', 'utf8');
            } catch(e) {
              driftOutput = 'Drift check output not available';
            }

            const hasDrift = driftOutput.includes('DRIFT_ALERT');
            const date = new Date().toISOString().split('T')[0];

            if (hasDrift) {
              const body = `## DATA DRIFT ALERT — Manual Retrain Review Required

              **Date:** ${date}
              **Status:** ⚠️ Significant drift detected

              ### Drift Detection Output
              \`\`\`
              ${driftOutput.substring(0, 3000)}
              \`\`\`

              ### Recommended Actions
              1. Review the Evidently HTML report (attached as workflow artifact)
              2. If drift is confirmed on key features, trigger manual retrain
              3. Check if protected attribute distributions have shifted (DPDP concern)

              > Auto-generated by EquiChurn Evidently Monitoring pipeline
              `;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[DRIFT ALERT] Data drift detected — ${date}`,
                body: body,
                labels: ['drift', 'monitoring', 'urgent']
              });
            }
